name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create ZIP
        run: |
          zip -r Details_iLvlDisplay.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.zip"

      - name: Upload to CurseForge
        uses: itsmeow/curseforge-upload@v3
        with:
          token: ${{ secrets.CF_API_KEY }}
          project_id: "1501917"
          game_endpoint: "wow"
          upload_retry_count: 3
          file_path: "Details_iLvlDisplay.zip"
          changelog: ${{ github.event.head_commit.message }}
          changelog_type: "markdown"
          game_versions: "12.0.1"
          release_type: "release"
          display_name: ${{ github.ref_name }}
